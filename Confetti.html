<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confetti Burst</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #09090e;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .card {
      position: relative;
      z-index: 20;
      background: #12121a;
      border: 1px solid #22222e;
      border-radius: 28px;
      padding: 52px 56px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      max-width: 420px;
      width: 90%;
    }

    .emoji { font-size: 3.2rem; margin-bottom: 18px; display: block; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #a78df7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.875rem;
      color: #5a5a6e;
      line-height: 1.65;
      margin-bottom: 36px;
      font-weight: 300;
    }

    .btn-group { display: flex; flex-direction: column; gap: 12px; }

    .btn {
      position: relative;
      overflow: hidden;
      padding: 15px 32px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.01em;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #7c6df0, #a78df7);
      color: #fff;
      box-shadow: 0 6px 28px rgba(124,109,240,0.4);
    }

    .btn-primary:hover { box-shadow: 0 10px 36px rgba(124,109,240,0.55); }

    .btn-success {
      background: linear-gradient(135deg, #059669, #34d399);
      color: #fff;
      box-shadow: 0 6px 28px rgba(52,211,153,0.3);
    }

    .btn-danger {
      background: linear-gradient(135deg, #dc2626, #f87171);
      color: #fff;
      box-shadow: 0 6px 28px rgba(248,113,113,0.3);
    }

    .btn-gold {
      background: linear-gradient(135deg, #b45309, #fbbf24);
      color: #fff;
      box-shadow: 0 6px 28px rgba(251,191,36,0.3);
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple-anim 0.55s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .counter {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #2a2a3a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      transition: color 0.3s;
    }

    .counter.active { color: #7c6df0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="card">
    <span class="emoji">🎉</span>
    <h1>Confetti Burst</h1>
    <p>Pick a burst style and watch the canvas explode with colour. Each button fires a uniquely tuned confetti effect.</p>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="burst(this, 'default')">Celebrate!</button>
      <button class="btn btn-success" onclick="burst(this, 'rain')">Confetti Rain</button>
      <button class="btn btn-danger"  onclick="burst(this, 'firework')">Firework Burst</button>
      <button class="btn btn-gold"    onclick="burst(this, 'gold')">Gold Shower</button>
    </div>
    <div class="counter" id="counter">Ready to burst</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [], animId = null, burstCount = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Particle ────────────────────────────────────────────────────────────
    class Particle {
      constructor(x, y, opts = {}) {
        this.x   = x;
        this.y   = y;
        const angle = opts.angle ?? (Math.random() * Math.PI * 2);
        const speed = opts.speed ?? (3 + Math.random() * 8);
        this.vx  = Math.cos(angle) * speed * (opts.spread ?? 1);
        this.vy  = Math.sin(angle) * speed - (opts.upward ?? 4);
        this.g   = opts.gravity ?? 0.22;
        this.life = opts.life   ?? (0.7 + Math.random() * 0.5);
        this.age  = 0;
        this.color = opts.color ?? randomColor(opts.palette);
        this.w   = opts.w ?? (5 + Math.random() * 7);
        this.h   = opts.h ?? (this.w * 0.4);
        this.rot  = Math.random() * Math.PI * 2;
        this.rotV = (Math.random() - 0.5) * 0.3;
        this.shape = opts.shape ?? (Math.random() < 0.5 ? 'rect' : 'circle');
        this.drag = opts.drag ?? 0.98;
      }

      update() {
        this.vx *= this.drag;
        this.vy  = this.vy * this.drag + this.g;
        this.x  += this.vx;
        this.y  += this.vy;
        this.rot += this.rotV;
        this.age += 0.016;
        return this.age < this.life && this.y < H + 20;
      }

      draw() {
        const alpha = Math.max(0, 1 - this.age / this.life);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = this.color;
        if (this.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        }
        ctx.restore();
      }
    }

    const PALETTES = {
      default:  ['#7c6df0','#a78df7','#f472b6','#60a5fa','#34d399','#fbbf24','#fb7185'],
      rain:     ['#38bdf8','#7dd3fc','#bae6fd','#e0f2fe','#fff'],
      firework: ['#ef4444','#f97316','#eab308','#fff','#fff5f5'],
      gold:     ['#fbbf24','#fcd34d','#fde68a','#f59e0b','#d97706','#fffbeb'],
    };

    function randomColor(palette) {
      const p = PALETTES[palette] ?? PALETTES.default;
      return p[Math.floor(Math.random() * p.length)];
    }

    // ── Burst presets ───────────────────────────────────────────────────────
    function burst(btn, type) {
      addRipple(btn);
      burstCount++;
      const cnt = document.getElementById('counter');
      cnt.textContent = `${burstCount} burst${burstCount > 1 ? 's' : ''} fired!`;
      cnt.classList.add('active');

      const cx = W / 2, cy = H / 2;

      if (type === 'default') {
        for (let i = 0; i < 160; i++) {
          particles.push(new Particle(cx, cy + 80, { palette:'default', upward:6, speed:3+Math.random()*10, life:1.2 }));
        }
      }

      if (type === 'rain') {
        // Drop from top at random positions
        for (let i = 0; i < 200; i++) {
          const p = new Particle(Math.random() * W, -10, {
            palette:'rain', angle: Math.PI * 0.5, upward:-1,
            speed: 2+Math.random()*5, gravity:0.18, drag:0.99, life:2.5,
          });
          p.vx = (Math.random()-0.5)*2;
          particles.push(p);
        }
      }

      if (type === 'firework') {
        // Multi-burst at random screen positions
        for (let b = 0; b < 5; b++) {
          const bx = W * (0.15 + Math.random() * 0.7);
          const by = H * (0.1  + Math.random() * 0.5);
          for (let i = 0; i < 60; i++) {
            const angle = (i / 60) * Math.PI * 2;
            particles.push(new Particle(bx, by, {
              palette:'firework', angle, spread:1,
              speed:4+Math.random()*7, upward:0,
              gravity:0.15, drag:0.96, life:0.9+Math.random()*0.5,
            }));
          }
        }
      }

      if (type === 'gold') {
        for (let i = 0; i < 220; i++) {
          const p = new Particle(cx + (Math.random()-0.5)*200, cy, {
            palette:'gold', upward:8, speed:5+Math.random()*12,
            gravity:0.28, drag:0.97, life:1.4,
            w: 6+Math.random()*6, h:null,
            shape: Math.random()<0.3 ? 'circle' : 'rect',
          });
          if (!p.h) p.h = p.w * 0.4;
          particles.push(p);
        }
      }

      if (!animId) loop();
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles = particles.filter(p => { const alive = p.update(); p.draw(); return alive; });
      animId = particles.length ? requestAnimationFrame(loop) : null;
    }

    function addRipple(btn) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const size = Math.max(btn.offsetWidth, btn.offsetHeight);
      r.style.cssText = `width:${size}px;height:${size}px;left:${btn.offsetWidth/2 - size/2}px;top:${btn.offsetHeight/2 - size/2}px`;
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }
  </script>
</body>
</html>
