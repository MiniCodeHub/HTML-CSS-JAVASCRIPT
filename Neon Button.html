<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Neon Button</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050816;
    }

    .neon-btn {
      position: relative;
      padding: 18px 40px;
      font-size: 18px;
      font-weight: bold;
      color: #00f7ff;
      background: transparent;
      border: 2px solid #00f7ff;
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      box-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff44;
    }

    .neon-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      transition: left 0.5s ease;
    }

    .neon-btn:hover::before {
      left: 100%;
    }

    .neon-btn:hover {
      color: #ffffff;
      background: #00f7ff22;
      transform: scale(1.08);
      box-shadow:
        0 0 15px #00f7ff,
        0 0 30px #00f7ff,
        0 0 60px #00f7ff;
    }

    .neon-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <button class="neon-btn" id="neonButton">
    Hover Me
  </button>

  <script>
    const button = document.getElementById('neonButton');

    button.addEventListener('click', () => {
      button.innerText = 'Clicked';

      setTimeout(() => {
        button.innerText = 'Hover Me';
      }, 1000);
    });
  </script>

</body>
</html>
