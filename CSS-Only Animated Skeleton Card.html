<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Animated Skeleton Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    padding:20px;
}

.card{
    width:350px;
    background:#1e293b;
    border-radius:20px;
    padding:20px;
    overflow:hidden;
    box-shadow:
        0 10px 30px
        rgba(0,0,0,.3);
}

.skeleton{
    position:relative;
    overflow:hidden;
    background:#334155;
}

.skeleton::before{
    content:"";

    position:absolute;
    top:0;
    left:-150%;

    width:150%;
    height:100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.18),
            transparent
        );

    animation:
        shimmer 1.5s infinite;
}

@keyframes shimmer{

    100%{
        left:150%;
    }

}

.image{
    width:100%;
    height:200px;
    border-radius:14px;
    margin-bottom:18px;
}

.avatar-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
}

.name{
    height:14px;
    width:120px;
    border-radius:8px;
    margin-bottom:8px;
}

.role{
    height:10px;
    width:80px;
    border-radius:8px;
}

.title{
    width:85%;
    height:18px;
    border-radius:8px;
    margin-bottom:15px;
}

.text{
    height:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.text.short{
    width:70%;
}

.footer{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

.button{
    width:100px;
    height:40px;
    border-radius:12px;
}

.icon{
    width:40px;
    height:40px;
    border-radius:12px;
}

</style>
</head>
<body>

<div class="card">

    <div class="image skeleton"></div>

    <div class="avatar-row">

        <div class="avatar skeleton"></div>

        <div>
            <div class="name skeleton"></div>
            <div class="role skeleton"></div>
        </div>

    </div>

    <div class="title skeleton"></div>

    <div class="text skeleton"></div>
    <div class="text skeleton"></div>
    <div class="text short skeleton"></div>

    <div class="footer">

        <div class="button skeleton"></div>

        <div class="icon skeleton"></div>

    </div>

</div>

</body>
</html>
