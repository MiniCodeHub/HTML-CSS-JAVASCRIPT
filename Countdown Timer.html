<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.15);
      width: 420px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a5b4fc;
      margin-bottom: 36px;
    }

    .time-display {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #e0e7ff;
      margin-bottom: 10px;
      transition: color 0.3s;
    }

    .time-display.warning { color: #f87171; }
    .time-display.pulse {
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 1; }
      to   { opacity: 0.4; }
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #2a2a4a;
      border-radius: 99px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 99px;
      transition: width 1s linear, background 0.3s;
      width: 100%;
    }

    .progress-fill.warning {
      background: linear-gradient(90deg, #f87171, #fb923c);
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .input-row label {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .input-row input {
      width: 72px;
      padding: 8px 10px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e7ff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #6366f1; }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    #startBtn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }

    #startBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }

    #pauseBtn {
      background: #2a2a4a;
      color: #a5b4fc;
    }

    #pauseBtn:hover { background: #3a3a5a; }
    #pauseBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #resetBtn {
      background: #2a2a4a;
      color: #94a3b8;
    }

    #resetBtn:hover { background: #3a3a5a; }

    .status {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #64748b;
      min-height: 20px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⏱ Countdown Timer</h1>

    <div class="time-display" id="timeDisplay">00:00</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="input-row">
      <label for="minutesInput">Minutes</label>
      <input type="number" id="minutesInput" min="0" max="99" value="1" />
      <label for="secondsInput">Seconds</label>
      <input type="number" id="secondsInput" min="0" max="59" value="30" />
    </div>

    <div class="btn-row">
      <button id="startBtn" onclick="startTimer()">Start</button>
      <button id="pauseBtn" onclick="pauseTimer()" disabled>Pause</button>
      <button id="resetBtn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    let totalSeconds = 0;
    let remainingSeconds = 0;
    let interval = null;
    let running = false;

    const timeDisplay  = document.getElementById('timeDisplay');
    const progressFill = document.getElementById('progressFill');
    const startBtn     = document.getElementById('startBtn');
    const pauseBtn     = document.getElementById('pauseBtn');
    const statusEl     = document.getElementById('status');

    function getInputSeconds() {
      const m = parseInt(document.getElementById('minutesInput').value) || 0;
      const s = parseInt(document.getElementById('secondsInput').value) || 0;
      return m * 60 + s;
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateUI() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      const pct = totalSeconds > 0 ? (remainingSeconds / totalSeconds) * 100 : 100;
      progressFill.style.width = pct + '%';

      const warn = remainingSeconds <= 10 && remainingSeconds > 0;
      timeDisplay.classList.toggle('warning', warn);
      progressFill.classList.toggle('warning', warn);
      timeDisplay.classList.toggle('pulse', remainingSeconds === 0 && totalSeconds > 0);
    }

    function startTimer() {
      if (running) return;

      if (!interval && remainingSeconds === 0) {
        totalSeconds = getInputSeconds();
        if (totalSeconds === 0) { statusEl.textContent = 'Please set a time!'; return; }
        remainingSeconds = totalSeconds;
      }

      running = true;
      startBtn.textContent = 'Running…';
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      statusEl.textContent = '';

      updateUI();

      interval = setInterval(() => {
        remainingSeconds--;
        updateUI();

        if (remainingSeconds <= 0) {
          clearInterval(interval);
          interval = null;
          running = false;
          startBtn.textContent = 'Start';
          startBtn.disabled = false;
          pauseBtn.disabled = true;
          statusEl.textContent = '🎉 Time\'s up!';
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!running) return;
      clearInterval(interval);
      interval = null;
      running = false;
      startBtn.textContent = 'Resume';
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      statusEl.textContent = 'Paused';
    }

    function resetTimer() {
      clearInterval(interval);
      interval = null;
      running = false;
      remainingSeconds = 0;
      totalSeconds = 0;
      startBtn.textContent = 'Start';
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      statusEl.textContent = '';
      timeDisplay.textContent = '00:00';
      timeDisplay.classList.remove('warning', 'pulse');
      progressFill.classList.remove('warning');
      progressFill.style.width = '100%';
    }

    // Initialise display
    updateUI();
  </script>
</body>
</html>
