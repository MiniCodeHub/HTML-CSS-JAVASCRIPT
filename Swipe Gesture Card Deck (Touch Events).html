<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Swipe Card Deck</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    overflow:hidden;
}

.container{
    position:relative;
    width:350px;
    height:500px;
}

.card{
    position:absolute;

    width:100%;
    height:100%;

    border-radius:24px;

    overflow:hidden;

    background:white;

    box-shadow:
        0 15px 35px rgba(0,0,0,0.25);

    cursor:grab;

    transition:
        transform 0.3s ease,
        opacity 0.3s ease;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-content{
    position:absolute;
    bottom:0;
    left:0;
    right:0;

    padding:25px;

    color:white;

    background:
        linear-gradient(
            transparent,
            rgba(0,0,0,0.8)
        );
}

.card-content h2{
    margin-bottom:8px;
}

.card:nth-child(1){
    z-index:3;
}

.card:nth-child(2){
    transform:
        scale(0.95)
        translateY(10px);

    z-index:2;
}

.card:nth-child(3){
    transform:
        scale(0.90)
        translateY(20px);

    z-index:1;
}

.badge{
    position:absolute;

    top:30px;

    padding:10px 20px;

    border:3px solid;

    font-size:28px;
    font-weight:bold;

    opacity:0;

    transition:0.2s;
}

.like{
    left:20px;
    color:#22c55e;
    border-color:#22c55e;
    transform:rotate(-15deg);
}

.nope{
    right:20px;
    color:#ef4444;
    border-color:#ef4444;
    transform:rotate(15deg);
}

.info{
    position:fixed;
    bottom:30px;
    color:white;
    text-align:center;
}

</style>
</head>

<body>

<div class="container" id="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800" alt="">
        <div class="badge like">LIKE</div>
        <div class="badge nope">NOPE</div>
        <div class="card-content">
            <h2>Emma, 24</h2>
            <p>Photographer</p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800" alt="">
        <div class="badge like">LIKE</div>
        <div class="badge nope">NOPE</div>
        <div class="card-content">
            <h2>James, 27</h2>
            <p>Designer</p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800" alt="">
        <div class="badge like">LIKE</div>
        <div class="badge nope">NOPE</div>
        <div class="card-content">
            <h2>Sophia, 23</h2>
            <p>Developer</p>
        </div>
    </div>

</div>

<div class="info">
    Drag left or right
</div>

<script>

const container =
document.getElementById("container");

let activeCard = null;

let startX = 0;
let currentX = 0;
let isDragging = false;

function getTopCard() {
    return document.querySelector(".card");
}

function initializeCard() {

    activeCard = getTopCard();

    if(!activeCard) return;

    activeCard.addEventListener(
        "mousedown",
        startDrag
    );

    activeCard.addEventListener(
        "touchstart",
        startDrag
    );
}

function startDrag(e){

    isDragging = true;

    startX =
        e.type === "touchstart"
        ? e.touches[0].clientX
        : e.clientX;

    document.addEventListener(
        "mousemove",
        drag
    );

    document.addEventListener(
        "mouseup",
        endDrag
    );

    document.addEventListener(
        "touchmove",
        drag
    );

    document.addEventListener(
        "touchend",
        endDrag
    );
}

function drag(e){

    if(!isDragging) return;

    currentX =
        e.type === "touchmove"
        ? e.touches[0].clientX
        : e.clientX;

    const deltaX =
        currentX - startX;

    const rotate =
        deltaX * 0.1;

    activeCard.style.transform =
        `translateX(${deltaX}px)
         rotate(${rotate}deg)`;

    const like =
        activeCard.querySelector(".like");

    const nope =
        activeCard.querySelector(".nope");

    if(deltaX > 0){

        like.style.opacity =
            Math.min(
                deltaX / 100,
                1
            );

        nope.style.opacity = 0;
    }
    else{

        nope.style.opacity =
            Math.min(
                Math.abs(deltaX) / 100,
                1
            );

        like.style.opacity = 0;
    }
}

function endDrag(){

    if(!isDragging) return;

    isDragging = false;

    const deltaX =
        currentX - startX;

    const threshold = 120;

    if(deltaX > threshold){

        swipeCard(1);
    }
    else if(deltaX < -threshold){

        swipeCard(-1);
    }
    else{

        activeCard.style.transform =
            "";

        activeCard
            .querySelector(".like")
            .style.opacity = 0;

        activeCard
            .querySelector(".nope")
            .style.opacity = 0;
    }

    document.removeEventListener(
        "mousemove",
        drag
    );

    document.removeEventListener(
        "mouseup",
        endDrag
    );

    document.removeEventListener(
        "touchmove",
        drag
    );

    document.removeEventListener(
        "touchend",
        endDrag
    );
}

function swipeCard(direction){

    activeCard.style.transform =
        `translateX(${direction * 1000}px)
         rotate(${direction * 45}deg)`;

    activeCard.style.opacity = 0;

    setTimeout(()=>{

        activeCard.remove();

        initializeCard();

    },300);
}

initializeCard();

</script>

</body>
</html>
