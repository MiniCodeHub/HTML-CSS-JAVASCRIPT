<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="ep4.css">
<title>Budget Tracker - Episode 4</title>
</head>

<body>

<div class="container">

<header>
    <h1>Budget Tracker</h1>

    <button class="add-btn" id="openModal">
        + Add Transaction
    </button>
</header>

<div class="transactions" id="transactionList">
    <div class="transaction">
        <span>Salary</span>
        <span class="income">+$5000</span>
    </div>

    <div class="transaction">
        <span>Rent</span>
        <span class="expense">-$1200</span>
    </div>
</div>

</div>

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Add Transaction</h2>

        <input
            type="text"
            id="title"
            placeholder="Transaction Name"
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount"
        >

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <div class="actions">
            <button class="save" id="saveBtn">
                Save
            </button>

            <button class="cancel" id="closeModal">
                Cancel
            </button>
        </div>

    </div>

</div>
<script src="ep4.js"></script>

</body>
</html>
