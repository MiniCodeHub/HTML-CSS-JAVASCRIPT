<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="ep4.css">
<title>Budget Tracker - Episode 4</title>
</head>

<body>

<div class="container">

<header>
    <h1>Budget Tracker</h1>

    <button class="add-btn" id="openModal">
        + Add Transaction
    </button>
</header>

<div class="transactions" id="transactionList">
    <div class="transaction">
        <span>Salary</span>
        <span class="income">+$5000</span>
    </div>

    <div class="transaction">
        <span>Rent</span>
        <span class="expense">-$1200</span>
    </div>
</div>

</div>

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Add Transaction</h2>

        <input
            type="text"
            id="title"
            placeholder="Transaction Name"
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount"
        >

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <div class="actions">
            <button class="save" id="saveBtn">
                Save
            </button>

            <button class="cancel" id="closeModal">
                Cancel
            </button>
        </div>

    </div>

</div>
<script src="ep4.js"></script>

</body>
</html>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.add-btn{
    background:#38bdf8;
    color:white;
}

.transactions{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

.transaction{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #334155;
}

.income{
    color:#22c55e;
}

.expense{
    color:#ef4444;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:400px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:12px;
    margin-bottom:16px;
    background:#0f172a;
    border:none;
    border-radius:10px;
    color:white;
}

.actions{
    display:flex;
    gap:10px;
}

.save{
    flex:1;
    background:#22c55e;
    color:white;
}

.cancel{
    flex:1;
    background:#ef4444;
    color:white;
}
</style>

<script>
    
const modal =
document.getElementById("modal");

const openModal =
document.getElementById("openModal");

const closeModal =
document.getElementById("closeModal");

const saveBtn =
document.getElementById("saveBtn");

const transactionList =
document.getElementById("transactionList");

openModal.onclick = () => {
    modal.classList.add("active");
};

closeModal.onclick = () => {
    modal.classList.remove("active");
};

saveBtn.onclick = () => {

    const title =
    document.getElementById("title").value;

    const amount =
    document.getElementById("amount").value;

    const type =
    document.getElementById("type").value;

    if(!title || !amount){
        alert("Please fill all fields");
        return;
    }

    const div =
    document.createElement("div");

    div.className = "transaction";

    div.innerHTML = `
        <span>${title}</span>
        <span class="${type}">
            ${type === "income" ? "+" : "-"}$${amount}
        </span>
    `;

    transactionList.appendChild(div);

    modal.classList.remove("active");

    document.getElementById("title").value="";
    document.getElementById("amount").value="";
};

</script>
