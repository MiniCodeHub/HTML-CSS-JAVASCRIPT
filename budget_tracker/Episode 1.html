<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Budget Tracker</title>

<link
rel="stylesheet"
href="ep1.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<h2>Budget</h2>

<nav>

<a href="#" class="active">
Dashboard
</a>

<a href="#">
Transactions
</a>

<a href="#">
Analytics
</a>

<a href="#">
Budget
</a>

<a href="#">
Settings
</a>

</nav>

</aside>

<main class="content">

<header>

<h1>
Budget Tracker
</h1>

<button>
+ Add Transaction
</button>

</header>

<section class="cards">

<div class="card">

<h3>Balance</h3>

<h2>$12,480</h2>

</div>

<div class="card">

<h3>Income</h3>

<h2>$18,900</h2>

</div>

<div class="card">

<h3>Expenses</h3>

<h2>$6,420</h2>

</div>

</section>

<section class="grid">

<div class="transactions">

<h2>
Recent Transactions
</h2>

<ul>

<li>
Salary
<span>
+$3000
</span>
</li>

<li>
Groceries
<span>
-$120
</span>
</li>

<li>
Netflix
<span>
-$15
</span>
</li>

<li>
Electric Bill
<span>
-$80
</span>
</li>

</ul>

</div>

<div class="chart">

<h2>
Monthly Overview
</h2>

<div class="placeholder">

Chart Coming Soon

</div>

</div>

</section>

</main>

</div>

<script src="ep1.js"></script>

</body>
</html>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.dashboard{
display:grid;
grid-template-columns:250px 1fr;
min-height:100vh;
}

.sidebar{
background:#1e293b;
padding:30px;
}

.sidebar h2{
margin-bottom:40px;
color:#38bdf8;
}

.sidebar nav{
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar a{
text-decoration:none;
color:#cbd5e1;
padding:12px;
border-radius:10px;
transition:.3s;
}

.sidebar a:hover,
.sidebar .active{
background:#38bdf8;
color:white;
}

.content{
padding:40px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:16px;
}

.card h3{
color:#94a3b8;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.transactions,
.chart{
background:#1e293b;
padding:25px;
border-radius:16px;
}

.transactions ul{
margin-top:20px;
list-style:none;
}

.transactions li{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #334155;
}

.placeholder{
margin-top:30px;
height:260px;
display:flex;
justify-content:center;
align-items:center;
border:2px dashed #475569;
border-radius:16px;
color:#64748b;
}

@media(max-width:900px){

.dashboard{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.cards{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

header{
flex-direction:column;
gap:20px;
align-items:flex-start;
}

}
</style>
<script>
    console.log(
"Budget Tracker Episode 1"
);
</script>
