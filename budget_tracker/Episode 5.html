<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Budget Tracker - Episode 5</title>
<link rel="stylesheet" href="ep5.css">
</head>

<body>

<div class="container">

<header>
    <h1>Budget Tracker</h1>

    <button class="add-btn" onclick="addTransaction()">
        + Add Transaction
    </button>
</header>

<table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

</div>

<script src="ep5.js" type="text/javascript"></script>

</body>
</html>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

button{
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.add-btn{
    background:#38bdf8;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:16px;
    overflow:hidden;
}

th,td{
    padding:16px;
    text-align:left;
}

th{
    background:#334155;
}

tr:nth-child(even){
    background:#273549;
}

.income{
    color:#22c55e;
}

.expense{
    color:#ef4444;
}

.badge{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.salary{
    background:#16a34a;
}

.food{
    background:#f59e0b;
}

.rent{
    background:#ef4444;
}

.edit{
    background:#3b82f6;
    color:white;
}

.delete{
    background:#ef4444;
    color:white;
}
</style>

<script>
    
let transactions = [
{
    title:"Salary",
    category:"salary",
    type:"income",
    amount:5000
},
{
    title:"Rent",
    category:"rent",
    type:"expense",
    amount:1200
},
{
    title:"Burger",
    category:"food",
    type:"expense",
    amount:20
}
];

function render(){

    const table =
    document.getElementById("tableBody");

    table.innerHTML="";

    transactions.forEach((t,index)=>{

        table.innerHTML += `
        <tr>
            <td>${t.title}</td>

            <td>
                <span class="badge ${t.category}">
                    ${t.category}
                </span>
            </td>

            <td class="${t.type}">
                ${t.type}
            </td>

            <td class="${t.type}">
                ${t.type==="income" ? "+" : "-"}$${t.amount}
            </td>

            <td>
                <button
                    class="edit"
                    onclick="editTransaction(${index})"
                >
                    Edit
                </button>

                <button
                    class="delete"
                    onclick="deleteTransaction(${index})"
                >
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
}

function addTransaction(){

    const title =
    prompt("Transaction Title");

    if(!title) return;

    const category =
    prompt("Category (salary/rent/food)") || "food";

    const type =
    prompt("Type (income/expense)") || "expense";

    const amount =
    Number(prompt("Amount"));

    transactions.push({
        title,
        category,
        type,
        amount
    });

    render();
}

function editTransaction(index){

    const title =
    prompt(
        "New Title",
        transactions[index].title
    );

    if(!title) return;

    transactions[index].title = title;

    render();
}

function deleteTransaction(index){

    transactions.splice(index,1);

    render();
}

render();
</script>
