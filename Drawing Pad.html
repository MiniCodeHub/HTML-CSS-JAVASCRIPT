<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drawing Pad</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #111118;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      flex-wrap: wrap;
    }

    .tool-sep { width: 1px; height: 28px; background: #2a2a38; margin: 0 4px; flex-shrink: 0; }

    /* Tool buttons */
    .t-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: #7a7a9a;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .t-btn:hover  { background: #25253a; color: #e8e8f0; }
    .t-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }

    .t-icon { font-size: 1rem; }

    /* Color swatches */
    .color-row { display: flex; gap: 5px; align-items: center; }

    .swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }

    .swatch:hover   { transform: scale(1.2); }
    .swatch.active  { border-color: #fff; transform: scale(1.15); }

    /* Custom color picker */
    .color-picker-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #444;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .color-picker-btn input[type=color] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      border: none;
      cursor: pointer;
      opacity: 0;
    }

    .color-picker-preview {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* Size slider */
    .size-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .size-label { font-size: 0.72rem; color: #7a7a9a; white-space: nowrap; }

    input[type=range].size-slider {
      width: 80px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    .size-val { font-size: 0.72rem; color: #e8e8f0; width: 22px; text-align: right; }

    /* Opacity slider */
    input[type=range].opacity-slider {
      width: 70px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 5px 16px;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      font-size: 0.68rem;
      color: #444460;
    }

    .status-item span { color: #7a7a9a; }

    /* ── Canvas ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      background-color: #0e0e16;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      touch-action: none;
    }

    /* Cursor styles per tool */
    .tool-pen     { cursor: crosshair; }
    .tool-eraser  { cursor: cell; }
    .tool-fill    { cursor: pointer; }
    .tool-line    { cursor: crosshair; }
    .tool-rect    { cursor: crosshair; }
    .tool-circle  { cursor: crosshair; }
    .tool-text    { cursor: text; }
  </style>
</head>
<body>

  <div class="toolbar">
    <!-- Tools -->
    <button class="t-btn active" id="tool-pen"    onclick="setTool('pen')">    <span class="t-icon">✏️</span> Pen</button>
    <button class="t-btn"        id="tool-line"   onclick="setTool('line')">   <span class="t-icon">📏</span> Line</button>
    <button class="t-btn"        id="tool-rect"   onclick="setTool('rect')">   <span class="t-icon">⬜</span> Rect</button>
    <button class="t-btn"        id="tool-circle" onclick="setTool('circle')"> <span class="t-icon">⭕</span> Circle</button>
    <button class="t-btn"        id="tool-fill"   onclick="setTool('fill')">   <span class="t-icon">🪣</span> Fill</button>
    <button class="t-btn"        id="tool-eraser" onclick="setTool('eraser')"> <span class="t-icon">🧹</span> Eraser</button>
    <button class="t-btn"        id="tool-text"   onclick="setTool('text')">   <span class="t-icon">T</span>  Text</button>

    <div class="tool-sep"></div>

    <!-- Colors -->
    <div class="color-row" id="swatches"></div>

    <!-- Custom color -->
    <div class="color-picker-btn" title="Custom colour">
      <input type="color" id="customColor" oninput="setCustomColor(this.value)"/>
      <div class="color-picker-preview" id="customPreview"></div>
    </div>

    <div class="tool-sep"></div>

    <!-- Size -->
    <div class="size-wrap">
      <span class="size-label">Size</span>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="60" value="6"
        oninput="brushSize=+this.value; document.getElementById('sizeVal').textContent=this.value"/>
      <span class="size-val" id="sizeVal">6</span>
    </div>

    <!-- Opacity -->
    <div class="size-wrap">
      <span class="size-label">Opacity</span>
      <input type="range" class="opacity-slider" id="opacitySlider" min="5" max="100" value="100"
        oninput="brushOpacity=+this.value/100"/>
    </div>

    <div class="tool-sep"></div>

    <!-- Actions -->
    <button class="t-btn" onclick="undo()">↩ Undo</button>
    <button class="t-btn" onclick="redo()">↪ Redo</button>
    <button class="t-btn" onclick="clearCanvas()">🗑 Clear</button>
    <button class="t-btn" onclick="saveImage()">💾 Save</button>
  </div>

  <div class="statusbar">
    <span class="status-item">Tool: <span id="st-tool">Pen</span></span>
    <span class="status-item">Pos: <span id="st-pos">0, 0</span></span>
    <span class="status-item">Size: <span id="st-size">6</span>px</span>
    <span class="status-item">Undo stack: <span id="st-undo">0</span></span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const wrap   = document.getElementById('canvasWrap');

    let tool         = 'pen';
    let brushSize    = 6;
    let brushOpacity = 1;
    let color        = '#a78df7';
    let drawing      = false;
    let lastX = 0, lastY = 0;
    let startX = 0, startY = 0;
    let undoStack = [];
    let redoStack = [];
    let snapshot  = null;  // for shape previews

    // ── Resize canvas to fill wrap ─────────────────────────────────────────
    function resize() {
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width  = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      ctx.putImageData(data, 0, 0);
    }

    new ResizeObserver(resize).observe(wrap);
    resize();

    // ── Colour palette ─────────────────────────────────────────────────────
    const COLORS = ['#ffffff','#f87171','#fb923c','#fbbf24','#4ade80','#34d399',
                    '#60a5fa','#818cf8','#a78df7','#f472b6','#94a3b8','#1e1b4b'];

    const swatchRow = document.getElementById('swatches');
    COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'swatch' + (c === color ? ' active' : '');
      s.style.background = c;
      s.title = c;
      s.onclick = () => { color = c; updateSwatches(c); };
      swatchRow.appendChild(s);
    });

    function updateSwatches(sel) {
      document.querySelectorAll('.swatch').forEach(s => {
        s.classList.toggle('active', s.style.background === sel ||
          s.style.backgroundColor === sel);
      });
      document.getElementById('customPreview').style.background = sel;
    }

    function setCustomColor(c) {
      color = c;
      document.getElementById('customPreview').style.background = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    }

    updateSwatches(color);

    // ── Tool switching ─────────────────────────────────────────────────────
    const TOOL_NAMES = { pen:'Pen', line:'Line', rect:'Rectangle', circle:'Circle',
                         fill:'Fill', eraser:'Eraser', text:'Text' };

    function setTool(t) {
      tool = t;
      document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tool-' + t)?.classList.add('active');
      canvas.className = 'tool-' + t;
      document.getElementById('st-tool').textContent = TOOL_NAMES[t] || t;
    }

    // ── Undo/Redo ──────────────────────────────────────────────────────────
    function saveState() {
      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (undoStack.length > 40) undoStack.shift();
      redoStack = [];
      document.getElementById('st-undo').textContent = undoStack.length;
    }

    function undo() {
      if (!undoStack.length) return;
      redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      ctx.putImageData(undoStack.pop(), 0, 0);
      document.getElementById('st-undo').textContent = undoStack.length;
    }

    function redo() {
      if (!redoStack.length) return;
      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      ctx.putImageData(redoStack.pop(), 0, 0);
      document.getElementById('st-undo').textContent = undoStack.length;
    }

    // ── Drawing helpers ────────────────────────────────────────────────────
    function setupCtx(erase = false) {
      ctx.globalAlpha        = erase ? 1 : brushOpacity;
      ctx.strokeStyle        = erase ? '#0e0e16' : color;
      ctx.fillStyle          = color;
      ctx.lineWidth          = brushSize;
      ctx.lineCap            = 'round';
      ctx.lineJoin           = 'round';
      ctx.globalCompositeOperation = erase ? 'destination-out' : 'source-over';
    }

    // Flood fill
    function floodFill(x, y, fillColor) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data    = imgData.data;
      const w       = canvas.width;
      const h       = canvas.height;
      const idx     = (Math.round(y) * w + Math.round(x)) * 4;
      const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];

      const fc = hexToRgba(fillColor);
      if (fc.r===tr && fc.g===tg && fc.b===tb && fc.a===ta) return;

      const stack = [{ x: Math.round(x), y: Math.round(y) }];
      const visited = new Uint8Array(w * h);

      while (stack.length) {
        const { x: cx, y: cy } = stack.pop();
        if (cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
        const i = cy * w + cx;
        if (visited[i]) continue;
        visited[i] = 1;
        const pi = i * 4;
        if (data[pi]!==tr||data[pi+1]!==tg||data[pi+2]!==tb||data[pi+3]!==ta) continue;
        data[pi]=fc.r; data[pi+1]=fc.g; data[pi+2]=fc.b; data[pi+3]=fc.a;
        stack.push({x:cx+1,y:cy},{x:cx-1,y:cy},{x:cx,y:cy+1},{x:cx,y:cy-1});
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function hexToRgba(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return { r, g, b, a: 255 };
    }

    // ── Pointer events ─────────────────────────────────────────────────────
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }

    function onDown(e) {
      const { x, y } = getPos(e);
      startX = lastX = x; startY = lastY = y;

      if (tool === 'fill') {
        saveState();
        floodFill(x, y, color);
        return;
      }

      if (tool === 'text') {
        const txt = prompt('Enter text:');
        if (!txt) return;
        saveState();
        setupCtx();
        ctx.font = `${brushSize * 4}px DM Sans, sans-serif`;
        ctx.fillText(txt, x, y);
        return;
      }

      drawing  = true;
      snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

      if (tool === 'pen' || tool === 'eraser') {
        setupCtx(tool === 'eraser');
        ctx.beginPath();
        ctx.moveTo(x, y);
      }
    }

    function onMove(e) {
      const { x, y } = getPos(e);
      document.getElementById('st-pos').textContent = `${Math.round(x)}, ${Math.round(y)}`;
      document.getElementById('st-size').textContent = brushSize;

      if (!drawing) return;
      e.preventDefault();

      if (tool === 'pen' || tool === 'eraser') {
        setupCtx(tool === 'eraser');
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x; lastY = y;
        return;
      }

      // Shape preview: restore snapshot then draw
      ctx.putImageData(snapshot, 0, 0);
      setupCtx();

      if (tool === 'line') {
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      if (tool === 'rect') {
        ctx.beginPath();
        ctx.strokeRect(startX, startY, x - startX, y - startY);
      }

      if (tool === 'circle') {
        const rx = Math.abs(x - startX) / 2;
        const ry = Math.abs(y - startY) / 2;
        const cx = startX + (x - startX) / 2;
        const cy = startY + (y - startY) / 2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function onUp() {
      if (!drawing) return;
      drawing = false;
      saveState();
      snapshot = null;
    }

    canvas.addEventListener('mousedown',  onDown);
    canvas.addEventListener('mousemove',  onMove);
    canvas.addEventListener('mouseup',    onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive:false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive:false });
    canvas.addEventListener('touchend',   onUp);

    // ── Actions ────────────────────────────────────────────────────────────
    function clearCanvas() {
      saveState();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveImage() {
      const link = document.createElement('a');
      link.download = 'drawing.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') { e.preventDefault(); undo(); }
        if (e.key === 'y') { e.preventDefault(); redo(); }
      }
      const keys = { p:'pen', l:'line', r:'rect', c:'circle', f:'fill', e:'eraser', t:'text' };
      if (!e.ctrlKey && !e.metaKey && keys[e.key]) setTool(keys[e.key]);
    });

    setTool('pen');
  </script>
</body>
</html>
