<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drag to Reorder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --surface2:  #1c1c21;
      --border:    #2a2a32;
      --border2:   #34343f;
      --text:      #f0f0f5;
      --muted:     #5a5a6e;
      --accent:    #7c6df0;
      --accent2:   #a78df7;
      --done-col:  #1a2e1a;
      --done-bord: #2a4a2a;
      --done-acc:  #4ade80;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 80px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 820px;
      margin-bottom: 36px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 5px;
    }

    .header-left p {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
    }

    .header-right { display: flex; gap: 8px; }

    .ctrl-btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.18s;
    }

    .ctrl-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124,109,240,0.08);
    }

    /* ── Progress ── */
    .progress-wrap {
      width: 100%;
      max-width: 820px;
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .progress-meta .pct { color: var(--done-acc); font-weight: 600; }

    .progress-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--done-acc));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Grid ── */
    .lists-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      width: 100%;
      max-width: 820px;
    }

    @media (max-width: 580px) { .lists-row { grid-template-columns: 1fr; } }

    /* ── Column ── */
    .col {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .col.done-col {
      background: var(--done-col);
      border-color: var(--done-bord);
    }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .done-col .col-header { border-color: var(--done-bord); }

    .col-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .col-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .done-col .col-dot { background: var(--done-acc); }

    .col-count {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Drop zone ── */
    .drop-zone {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 100px;
      transition: background 0.2s;
      position: relative;
    }

    .drop-zone.drag-over { background: rgba(124,109,240,0.04); }
    .done-col .drop-zone.drag-over { background: rgba(74,222,128,0.04); }

    .empty-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--border2);
      pointer-events: none;
      font-style: italic;
      font-weight: 300;
    }

    /* ── Drop line ── */
    .drop-line {
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      margin: 1px 2px;
      opacity: 0;
      transition: opacity 0.12s;
      pointer-events: none;
      flex-shrink: 0;
    }

    .drop-line.show { opacity: 1; }
    .done-col .drop-line { background: var(--done-acc); }

    /* ── Item ── */
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: grab;
      user-select: none;
      margin: 3px 0;
      transition: box-shadow 0.2s, opacity 0.2s, border-color 0.2s,
                  background 0.3s, transform 0.15s;
    }

    .item:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .item.is-done {
      background: rgba(74,222,128,0.05);
      border-color: rgba(74,222,128,0.18);
    }

    .item.dragging { opacity: 0.25; cursor: grabbing; }

    .item.drop-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124,109,240,0.22);
    }

    .done-col .item.drop-target {
      border-color: var(--done-acc);
      box-shadow: 0 0 0 2px rgba(74,222,128,0.18);
    }

    /* ── Drag handle ── */
    .handle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
      opacity: 0.2;
      cursor: grab;
      transition: opacity 0.15s;
    }

    .item:hover .handle { opacity: 0.55; }
    .handle span { display: block; width: 14px; height: 1.5px; background: var(--text); border-radius: 1px; }

    /* ── Checkbox ── */
    .cb-wrap {
      position: relative;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .cb-wrap input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
      margin: 0;
    }

    .cb-box {
      position: absolute;
      inset: 0;
      border-radius: 5px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      transition: background 0.2s, border-color 0.2s, transform 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .cb-wrap input:checked + .cb-box {
      background: var(--done-acc);
      border-color: var(--done-acc);
      transform: scale(1.12);
    }

    .cb-box svg {
      width: 10px; height: 10px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .cb-wrap input:checked + .cb-box svg { opacity: 1; }

    /* ── Icon ── */
    .item-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      line-height: 1;
      transition: filter 0.25s;
    }

    .item.is-done .item-icon { filter: grayscale(0.55) opacity(0.7); }

    /* ── Body ── */
    .item-body { flex: 1; min-width: 0; }

    .item-title {
      font-size: 0.81rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.25s;
      position: relative;
    }

    /* Animated strikethrough */
    .item-title::after {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 0%;
      height: 1.5px;
      background: var(--done-acc);
      border-radius: 1px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .item.is-done .item-title { color: var(--muted); }
    .item.is-done .item-title::after { width: 100%; }

    .item-sub {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1px;
    }

    /* ── Badge ── */
    .badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-high { background: rgba(248,113,113,0.12); color:#f87171; border:1px solid rgba(248,113,113,0.2); }
    .badge-med  { background: rgba(251,191,36,0.10);  color:#fbbf24; border:1px solid rgba(251,191,36,0.2);  }
    .badge-low  { background: rgba(74,222,128,0.10);  color:#4ade80; border:1px solid rgba(74,222,128,0.2);  }
    .badge-done { background: rgba(90,90,110,0.12);   color:var(--muted); border:1px solid var(--border);   }

    /* ── Del button ── */
    .del-btn {
      width: 20px; height: 20px;
      border: none; background: transparent;
      color: var(--muted); font-size: 0.7rem;
      cursor: pointer; flex-shrink: 0;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s, background 0.15s, color 0.15s;
    }

    .item:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: rgba(248,113,113,0.15); color: #f87171; }

    /* ── Flash ── */
    @keyframes flash-green {
      0%   { box-shadow: 0 0 0 0   rgba(74,222,128,0.7); }
      60%  { box-shadow: 0 0 0 10px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0   rgba(74,222,128,0); }
    }

    .item.flash { animation: flash-green 0.55s ease; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>Task Board</h1>
      <p>Drag between columns or tick the checkbox — items auto-check when moved to Completed.</p>
    </div>
    <div class="header-right">
      <button class="ctrl-btn" onclick="shuffleList('todo')">Shuffle</button>
      <button class="ctrl-btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressLabel">0 of 8 completed</span>
      <span class="pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="lists-row">
    <div class="col" id="col-todo">
      <div class="col-header">
        <div class="col-title"><span class="col-dot"></span>To Do</div>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="drop-zone" id="todo">
        <span class="empty-hint">All done!</span>
      </div>
    </div>

    <div class="col done-col" id="col-done">
      <div class="col-header">
        <div class="col-title"><span class="col-dot"></span>Completed</div>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="drop-zone" id="done">
        <span class="empty-hint">Drag here to complete</span>
      </div>
    </div>
  </div>

  <script>
    // ── Seed data ──────────────────────────────────────────────────────────
    const SEED = [
      { id:'a', icon:'🚀', title:'Launch product page',   sub:'Design + Dev',  badge:'high', done:false },
      { id:'b', icon:'🔐', title:'Setup authentication',  sub:'Backend',        badge:'high', done:false },
      { id:'c', icon:'📊', title:'Analytics dashboard',   sub:'Frontend',       badge:'med',  done:false },
      { id:'d', icon:'📱', title:'Mobile responsiveness', sub:'CSS',            badge:'med',  done:false },
      { id:'e', icon:'🌐', title:'Internationalisation',  sub:'i18n',           badge:'low',  done:false },
      { id:'f', icon:'✍️', title:'Write release notes',   sub:'Documentation',  badge:'low',  done:false },
      { id:'g', icon:'🧪', title:'End-to-end tests',      sub:'QA',             badge:'high', done:true  },
      { id:'h', icon:'⚙️', title:'CI/CD pipeline',        sub:'DevOps',         badge:'med',  done:true  },
    ];

    let ITEMS = { todo:[], done:[] };
    let dragSrc = null;
    let dragEl  = null;

    function seedData() {
      ITEMS.todo = SEED.filter(d => !d.done).map(d => ({...d}));
      ITEMS.done = SEED.filter(d =>  d.done).map(d => ({...d}));
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function render() {
      renderZone('todo');
      renderZone('done');
      updateProgress();
    }

    function renderZone(listId) {
      const zone = document.getElementById(listId);
      zone.querySelectorAll('.item, .drop-line').forEach(el => el.remove());

      const items = ITEMS[listId];
      document.getElementById('count-' + listId).textContent = items.length;
      zone.querySelector('.empty-hint').style.display = items.length ? 'none' : '';

      items.forEach((item, idx) => {
        zone.appendChild(makeDropLine(listId, idx));
        zone.appendChild(makeItem(item, listId, idx));
      });
      zone.appendChild(makeDropLine(listId, items.length));

      // Zone-level drop (bare zone = append)
      zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
      zone.ondragleave = e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); };
      zone.ondrop = e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        clearLines();
        if (!dragSrc || e.target !== zone) return;
        moveItem(dragSrc.listId, dragSrc.idx, listId, ITEMS[listId].length);
      };
    }

    function makeDropLine(listId, insertIdx) {
      const line = document.createElement('div');
      line.className = 'drop-line';
      line.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); clearLines(); line.classList.add('show'); });
      line.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation(); clearLines();
        if (!dragSrc) return;
        moveItem(dragSrc.listId, dragSrc.idx, listId, insertIdx);
      });
      return line;
    }

    function makeItem(item, listId, idx) {
      const el = document.createElement('div');
      el.className = 'item' + (item.done ? ' is-done' : '');
      el.draggable = true;
      el.dataset.id  = item.id;
      el.dataset.idx = idx;

      const badgeClass = item.done ? 'badge-done' : 'badge-' + item.badge;
      const badgeTxt   = item.done ? 'Done' : item.badge[0].toUpperCase() + item.badge.slice(1);

      el.innerHTML = `
        <div class="handle"><span></span><span></span><span></span></div>
        <label class="cb-wrap" title="${item.done ? 'Mark incomplete' : 'Mark complete'}">
          <input type="checkbox" ${item.done ? 'checked' : ''}/>
          <span class="cb-box">
            <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0d1a0d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </label>
        <span class="item-icon">${item.icon}</span>
        <div class="item-body">
          <div class="item-title">${item.title}</div>
          <div class="item-sub">${item.sub}</div>
        </div>
        <span class="badge ${badgeClass}">${badgeTxt}</span>
        <button class="del-btn" title="Remove">&#215;</button>
      `;

      // Checkbox: toggle done & move list
      el.querySelector('input[type="checkbox"]').addEventListener('change', function() {
        const nowDone = this.checked;
        const dst = nowDone ? 'done' : 'todo';
        if (listId !== dst) {
          const [moved] = ITEMS[listId].splice(idx, 1);
          moved.done = nowDone;
          nowDone ? ITEMS.done.push(moved) : ITEMS.todo.unshift(moved);
          render();
          flashItem(moved.id);
        } else {
          ITEMS[listId][idx].done = nowDone;
          render();
        }
      });

      // Delete
      el.querySelector('.del-btn').addEventListener('click', e => {
        e.stopPropagation();
        ITEMS[listId].splice(idx, 1);
        render();
      });

      // Drag
      el.addEventListener('dragstart', e => {
        dragSrc = { id: item.id, listId, idx };
        dragEl  = el;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => el.classList.add('dragging'), 0);
      });

      el.addEventListener('dragend', () => {
        el.classList.remove('dragging', 'drop-target');
        clearLines();
        document.querySelectorAll('.item.drop-target').forEach(i => i.classList.remove('drop-target'));
        dragSrc = null;
        dragEl  = null;
      });

      el.addEventListener('dragover', e => {
        e.preventDefault();
        e.stopPropagation();
        if (dragEl === el) return;
        document.querySelectorAll('.item.drop-target').forEach(i => i.classList.remove('drop-target'));
        el.classList.add('drop-target');
        clearLines();
        const prev = el.previousElementSibling;
        if (prev && prev.classList.contains('drop-line')) prev.classList.add('show');
      });

      el.addEventListener('dragleave', e => {
        if (!el.contains(e.relatedTarget)) el.classList.remove('drop-target');
      });

      el.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        el.classList.remove('drop-target');
        clearLines();
        if (!dragSrc || dragEl === el) return;
        moveItem(dragSrc.listId, dragSrc.idx, listId, idx);
      });

      return el;
    }

    // ── Move ───────────────────────────────────────────────────────────────
    function moveItem(srcList, srcIdx, dstList, dstIdx) {
      const [moved] = ITEMS[srcList].splice(srcIdx, 1);
      const toDone  = dstList === 'done' && srcList !== 'done';
      const toTodo  = dstList === 'todo' && srcList !== 'todo';

      if (toDone) moved.done = true;
      if (toTodo) moved.done = false;

      let adj = dstIdx;
      if (srcList === dstList && srcIdx < dstIdx) adj = Math.max(0, dstIdx - 1);

      ITEMS[dstList].splice(adj, 0, moved);
      render();

      if (toDone || toTodo) flashItem(moved.id);
    }

    function flashItem(id) {
      requestAnimationFrame(() => {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (!el) return;
        el.classList.add('flash');
        el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
      });
    }

    // ── Progress ───────────────────────────────────────────────────────────
    function updateProgress() {
      const total = ITEMS.todo.length + ITEMS.done.length;
      const done  = ITEMS.done.length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} of ${total} completed`;
      document.getElementById('progressPct').textContent   = pct + '%';
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function clearLines() {
      document.querySelectorAll('.drop-line.show').forEach(l => l.classList.remove('show'));
    }

    function shuffleList(listId) {
      const a = ITEMS[listId];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      render();
    }

    function resetAll() { seedData(); render(); }

    // ── Touch ──────────────────────────────────────────────────────────────
    let touchData = null;

    document.addEventListener('touchstart', e => {
      const el = e.target.closest('.item');
      if (!el) return;
      touchData = { el, listId: el.closest('.drop-zone').id, idx: +el.dataset.idx };
      el.classList.add('dragging');
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!touchData) return;
      e.preventDefault();
      const t = e.touches[0];
      document.querySelectorAll('.item.drop-target').forEach(i => i.classList.remove('drop-target'));
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const overItem = over && over.closest('.item');
      if (overItem && overItem !== touchData.el) overItem.classList.add('drop-target');
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (!touchData) return;
      touchData.el.classList.remove('dragging');
      document.querySelectorAll('.item.drop-target').forEach(i => i.classList.remove('drop-target'));
      const t = e.changedTouches[0];
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const overItem = over && over.closest('.item');
      const overZone = over && over.closest('.drop-zone');
      if (overItem && overItem !== touchData.el) {
        moveItem(touchData.listId, touchData.idx, overItem.closest('.drop-zone').id, +overItem.dataset.idx);
      } else if (overZone && !overItem) {
        moveItem(touchData.listId, touchData.idx, overZone.id, ITEMS[overZone.id].length);
      }
      touchData = null;
    });

    // ── Init ──────────────────────────────────────────────────────────────
    seedData();
    render();
  </script>
</body>
</html>
