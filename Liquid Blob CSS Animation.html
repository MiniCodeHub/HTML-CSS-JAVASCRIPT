<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Liquid Blob Animation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #020617;
      position: relative;
    }

    .container {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Main Blob */
    .blob {
      position: absolute;
      width: 320px;
      height: 320px;
      background: linear-gradient(
        135deg,
        #38bdf8,
        #8b5cf6,
        #ec4899
      );

      border-radius: 40% 60% 55% 45% / 45% 35% 65% 55%;

      animation:
        morph 8s ease-in-out infinite,
        float 6s ease-in-out infinite;

      filter: blur(0px);

      box-shadow:
        0 0 80px rgba(56, 189, 248, 0.5),
        0 0 120px rgba(139, 92, 246, 0.4);
    }

    /* Second Blob */
    .blob:nth-child(2) {
      width: 220px;
      height: 220px;

      background: linear-gradient(
        135deg,
        #06b6d4,
        #3b82f6
      );

      animation:
        morph2 10s ease-in-out infinite,
        float2 7s ease-in-out infinite;

      opacity: 0.7;
    }

    /* Third Blob */
    .blob:nth-child(3) {
      width: 160px;
      height: 160px;

      background: linear-gradient(
        135deg,
        #f472b6,
        #8b5cf6
      );

      animation:
        morph3 12s ease-in-out infinite,
        float3 5s ease-in-out infinite;

      opacity: 0.8;
    }

    /* Glass Card */
    .card {
      position: relative;
      z-index: 10;

      width: 320px;
      padding: 40px;

      border-radius: 24px;

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.12);

      backdrop-filter: blur(16px);

      text-align: center;

      color: white;
    }

    .card h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    .card p {
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      font-size: 16px;
    }

    .card button {
      margin-top: 24px;

      padding: 14px 26px;

      border: none;
      border-radius: 14px;

      background: linear-gradient(
        135deg,
        #38bdf8,
        #8b5cf6
      );

      color: white;
      font-size: 16px;
      font-weight: bold;

      cursor: pointer;

      transition: transform 0.3s ease;
    }

    .card button:hover {
      transform: scale(1.08);
    }

    /* Blob Morph Animation */
    @keyframes morph {
      0% {
        border-radius:
          40% 60% 55% 45% /
          45% 35% 65% 55%;
      }

      25% {
        border-radius:
          70% 30% 40% 60% /
          55% 60% 40% 45%;
      }

      50% {
        border-radius:
          30% 70% 70% 30% /
          30% 40% 60% 70%;
      }

      75% {
        border-radius:
          60% 40% 30% 70% /
          65% 35% 55% 45%;
      }

      100% {
        border-radius:
          40% 60% 55% 45% /
          45% 35% 65% 55%;
      }
    }

    @keyframes morph2 {
      0% {
        border-radius:
          55% 45% 35% 65% /
          50% 60% 40% 50%;
      }

      50% {
        border-radius:
          35% 65% 65% 35% /
          60% 40% 60% 40%;
      }

      100% {
        border-radius:
          55% 45% 35% 65% /
          50% 60% 40% 50%;
      }
    }

    @keyframes morph3 {
      0% {
        border-radius:
          50% 50% 60% 40% /
          40% 60% 40% 60%;
      }

      50% {
        border-radius:
          70% 30% 50% 50% /
          50% 30% 70% 50%;
      }

      100% {
        border-radius:
          50% 50% 60% 40% /
          40% 60% 40% 60%;
      }
    }

    /* Floating Animations */
    @keyframes float {
      0%, 100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(20px, -25px);
      }
    }

    @keyframes float2 {
      0%, 100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-30px, 20px);
      }
    }

    @keyframes float3 {
      0%, 100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(15px, 15px);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Animated Blobs -->
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>

    <!-- Glass Card -->
    <div class="card">
      <h1>Liquid UI</h1>

      <p>
        Modern liquid blob animation using only
        HTML and CSS keyframes.
      </p>

      <button>
        Explore
      </button>
    </div>

  </div>

</body>
</html>
