<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Draggable Floating Widget</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(
        135deg,
        #0f172a,
        #111827
      );
      color: white;
    }

    .widget {
      position: absolute;
      top: 120px;
      left: 120px;
      width: 320px;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        0 0 30px rgba(59,130,246,0.15);
      user-select: none;
    }

    .widget-header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      cursor: grab;
    }

    .widget-header:active {
      cursor: grabbing;
    }

    .widget-title {
      font-size: 18px;
      font-weight: bold;
    }

    .toggle-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s;
    }

    .toggle-btn:hover {
      transform: scale(1.08);
    }

    .widget-content {
      padding: 20px;
      transition: all 0.3s ease;
    }

    .widget-content.hidden {
      display: none;
    }

    .widget-card {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .widget-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .widget-card p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.5;
      font-size: 14px;
    }

    .position {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #38bdf8;
    }

    .background-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(
          rgba(255,255,255,0.04) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 1px,
          transparent 1px
        );

      background-size: 40px 40px;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="background-grid"></div>

  <!-- Widget -->
  <div class="widget" id="widget">

    <!-- Header -->
    <div class="widget-header" id="widgetHeader">
      <div class="widget-title">
        Floating Widget
      </div>

      <button class="toggle-btn" id="toggleBtn">
        −
      </button>
    </div>

    <!-- Content -->
    <div class="widget-content" id="widgetContent">

      <div class="widget-card">
        <h3>Draggable UI</h3>

        <p>
          Click and drag this widget anywhere on the screen.
        </p>
      </div>

      <div class="widget-card">
        <h3>Mouse Events</h3>

        <p>
          Built using mouse move and mouse down events.
        </p>
      </div>

      <div class="position" id="positionText">
        X: 120 | Y: 120
      </div>

    </div>
  </div>

  <script>
    const widget = document.getElementById('widget');
    const header = document.getElementById('widgetHeader');
    const content = document.getElementById('widgetContent');
    const toggleBtn = document.getElementById('toggleBtn');
    const positionText = document.getElementById('positionText');

    let isDragging = false;

    let offsetX = 0;
    let offsetY = 0;

    // Start dragging
    header.addEventListener('mousedown', (e) => {

      isDragging = true;

      offsetX = e.clientX - widget.offsetLeft;
      offsetY = e.clientY - widget.offsetTop;

      widget.style.transition = 'none';
    });

    // Drag movement
    document.addEventListener('mousemove', (e) => {

      if (!isDragging) return;

      const x = e.clientX - offsetX;
      const y = e.clientY - offsetY;

      widget.style.left = `${x}px`;
      widget.style.top = `${y}px`;

      positionText.textContent =
        `X: ${x} | Y: ${y}`;
    });

    // Stop dragging
    document.addEventListener('mouseup', () => {

      isDragging = false;

      widget.style.transition =
        'box-shadow 0.3s ease';
    });

    // Toggle content
    toggleBtn.addEventListener('click', () => {

      content.classList.toggle('hidden');

      toggleBtn.textContent =
        content.classList.contains('hidden')
          ? '+'
          : '−';
    });
  </script>

</body>
</html>
