<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Parallax Star Field</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#020617;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

.content{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;

    pointer-events:none;
}

.content h1{
    font-size:5rem;
    margin-bottom:20px;
}

.content p{
    font-size:1.2rem;
    color:#cbd5e1;
    max-width:700px;
}

</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="content">
    <h1>Night Sky</h1>
    <p>
        Move your mouse and watch the stars
        react with a smooth parallax effect.
    </p>
</div>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

let width;
let height;

function resizeCanvas(){

    width =
    canvas.width =
    window.innerWidth;

    height =
    canvas.height =
    window.innerHeight;
}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

const mouse = {
    x: width / 2,
    y: height / 2
};

window.addEventListener(
    "mousemove",
    (e)=>{
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    }
);

class Star{

    constructor(){

        this.reset();
    }

    reset(){

        this.x =
            Math.random() * width;

        this.y =
            Math.random() * height;

        this.radius =
            Math.random() * 2 + 0.5;

        this.depth =
            Math.random() * 3 + 1;

        this.opacity =
            Math.random();

        this.speed =
            Math.random() * 0.01;
    }

    update(){

        this.opacity += this.speed;

        if(
            this.opacity > 1 ||
            this.opacity < 0.2
        ){
            this.speed *= -1;
        }
    }

    draw(){

        const offsetX =
            (
                mouse.x -
                width / 2
            ) *
            0.01 *
            this.depth;

        const offsetY =
            (
                mouse.y -
                height / 2
            ) *
            0.01 *
            this.depth;

        ctx.beginPath();

        ctx.arc(
            this.x + offsetX,
            this.y + offsetY,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            `rgba(
                255,
                255,
                255,
                ${this.opacity}
            )`;

        ctx.fill();
    }
}

const stars = [];

for(let i = 0; i < 500; i++){

    stars.push(
        new Star()
    );
}

function drawMoon(){

    ctx.beginPath();

    ctx.arc(
        width - 180,
        140,
        60,
        0,
        Math.PI * 2
    );

    ctx.fillStyle =
        "#f8fafc";

    ctx.fill();

    ctx.beginPath();

    ctx.arc(
        width - 160,
        120,
        55,
        0,
        Math.PI * 2
    );

    ctx.fillStyle =
        "#020617";

    ctx.fill();
}

function animate(){

    ctx.clearRect(
        0,
        0,
        width,
        height
    );

    drawMoon();

    stars.forEach(star=>{

        star.update();
        star.draw();

    });

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
