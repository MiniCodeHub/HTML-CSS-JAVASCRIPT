<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Animated Gradient Background</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
}

body{

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(
    -45deg,
    #ff006e,
    #8338ec,
    #3a86ff,
    #06d6a0
  );

  background-size:400% 400%;

  animation:
    gradientShift 10s ease infinite;

  overflow:hidden;
}

@keyframes gradientShift{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

.card{

  width:90%;
  max-width:700px;

  padding:50px;

  border-radius:24px;

  backdrop-filter:blur(20px);

  background:rgba(255,255,255,0.1);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.2);

  text-align:center;

  color:white;
}

.card h1{

  font-size:4rem;

  margin-bottom:20px;
}

.card p{

  font-size:1.2rem;

  line-height:1.8;

  color:rgba(255,255,255,0.85);
}

.button{

  margin-top:30px;

  display:inline-block;

  padding:14px 30px;

  border-radius:999px;

  text-decoration:none;

  color:white;

  border:1px solid rgba(255,255,255,0.3);

  background:rgba(255,255,255,0.15);

  transition:0.3s;
}

.button:hover{

  transform:translateY(-4px);

  background:rgba(255,255,255,0.25);
}

.glow{

  position:absolute;

  width:300px;
  height:300px;

  border-radius:50%;

  background:rgba(255,255,255,0.15);

  filter:blur(80px);

  animation:
    floatGlow 6s ease-in-out infinite;
}

.glow.one{
  top:-100px;
  left:-100px;
}

.glow.two{
  bottom:-100px;
  right:-100px;
}

@keyframes floatGlow{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-40px);
  }
}

@media(max-width:768px){

  .card{
    padding:35px;
  }

  .card h1{
    font-size:2.5rem;
  }

  .card p{
    font-size:1rem;
  }
}

</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="card">

  <h1>Animated Gradient</h1>

  <p>
    Pure CSS animated background using
    gradients, keyframes and glassmorphism.
    Perfect for modern landing pages and
    portfolio websites.
  </p>

  <a href="#" class="button">
    Get Started
  </a>

</div>

</body>
</html>
