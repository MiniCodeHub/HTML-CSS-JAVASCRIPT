<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Range Slider</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #2d3f55;
      border-radius: 24px;
      padding: 48px 48px;
      width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 44px;
    }

    /* ── Slider group ── */
    .slider-group {
      margin-bottom: 40px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .slider-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .slider-value {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      transition: color 0.3s;
    }

    .slider-unit {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      margin-left: 2px;
    }

    /* ── Track container ── */
    .track-wrap {
      position: relative;
      height: 36px;
      display: flex;
      align-items: center;
    }

    /* Hide native input but keep interactive */
    input[type="range"] {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 3;
      margin: 0;
    }

    .track-bg {
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      background: #2d3f55;
      border-radius: 99px;
      z-index: 1;
    }

    .track-fill {
      position: absolute;
      left: 0;
      height: 6px;
      border-radius: 99px;
      z-index: 2;
      transition: width 0.05s linear;
    }

    .thumb {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 2;
      transform: translateX(-50%);
      transition: left 0.05s linear, transform 0.15s;
      pointer-events: none;
    }

    input[type="range"]:active ~ .thumb {
      transform: translateX(-50%) scale(1.2);
    }

    /* ── Tooltip bubble ── */
    .bubble {
      position: absolute;
      top: -38px;
      transform: translateX(-50%);
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, left 0.05s linear;
      z-index: 10;
    }

    .bubble::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #0f172a;
    }

    .track-wrap:hover .bubble,
    input[type="range"]:focus ~ .bubble {
      opacity: 1;
    }

    /* ── Tick marks ── */
    .ticks {
      display: flex;
      justify-content: space-between;
      padding: 6px 2px 0;
    }

    .tick {
      font-size: 0.7rem;
      color: #475569;
      text-align: center;
    }

    /* ── Result display ── */
    .result-bar {
      background: #0f172a;
      border: 1px solid #2d3f55;
      border-radius: 16px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .result-item { text-align: center; }

    .result-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #475569;
      margin-bottom: 6px;
    }

    .result-val {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 1px;
      background: #2d3f55;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Custom Range Slider</h1>
  <p class="subtitle">Drag the sliders to see live values update.</p>

  <!-- Slider 1: Volume -->
  <div class="slider-group">
    <div class="slider-header">
      <span class="slider-label">Volume</span>
      <span class="slider-value" id="vol-val" style="color:#6366f1">75<span class="slider-unit">%</span></span>
    </div>
    <div class="track-wrap" id="vol-wrap">
      <input type="range" id="vol" min="0" max="100" value="75"/>
      <div class="track-bg"></div>
      <div class="track-fill" id="vol-fill" style="background:linear-gradient(90deg,#6366f1,#8b5cf6)"></div>
      <div class="thumb"      id="vol-thumb" style="background:#6366f1"></div>
      <div class="bubble"     id="vol-bubble">75%</div>
    </div>
    <div class="ticks">
      <span class="tick">0</span><span class="tick">25</span>
      <span class="tick">50</span><span class="tick">75</span><span class="tick">100</span>
    </div>
  </div>

  <!-- Slider 2: Temperature -->
  <div class="slider-group">
    <div class="slider-header">
      <span class="slider-label">Temperature</span>
      <span class="slider-value" id="temp-val" style="color:#f59e0b">22<span class="slider-unit">°C</span></span>
    </div>
    <div class="track-wrap" id="temp-wrap">
      <input type="range" id="temp" min="-10" max="50" value="22"/>
      <div class="track-bg"></div>
      <div class="track-fill" id="temp-fill" style="background:linear-gradient(90deg,#3b82f6,#f59e0b)"></div>
      <div class="thumb"      id="temp-thumb" style="background:#f59e0b"></div>
      <div class="bubble"     id="temp-bubble">22°C</div>
    </div>
    <div class="ticks">
      <span class="tick">-10</span><span class="tick">5</span>
      <span class="tick">20</span><span class="tick">35</span><span class="tick">50</span>
    </div>
  </div>

  <!-- Slider 3: Budget -->
  <div class="slider-group" style="margin-bottom:28px">
    <div class="slider-header">
      <span class="slider-label">Budget</span>
      <span class="slider-value" id="bud-val" style="color:#10b981">$<span id="bud-num">5000</span><span class="slider-unit"></span></span>
    </div>
    <div class="track-wrap" id="bud-wrap">
      <input type="range" id="bud" min="0" max="20000" step="500" value="5000"/>
      <div class="track-bg"></div>
      <div class="track-fill" id="bud-fill" style="background:linear-gradient(90deg,#10b981,#34d399)"></div>
      <div class="thumb"      id="bud-thumb" style="background:#10b981"></div>
      <div class="bubble"     id="bud-bubble">$5,000</div>
    </div>
    <div class="ticks">
      <span class="tick">$0</span><span class="tick">$5k</span>
      <span class="tick">$10k</span><span class="tick">$15k</span><span class="tick">$20k</span>
    </div>
  </div>

  <!-- Summary -->
  <div class="result-bar">
    <div class="result-item">
      <div class="result-label">Volume</div>
      <div class="result-val" id="r-vol" style="color:#6366f1">75%</div>
    </div>
    <div class="result-item">
      <div class="result-label">Temperature</div>
      <div class="result-val" id="r-temp" style="color:#f59e0b">22°C</div>
    </div>
    <div class="result-item" style="grid-column:1/-1">
      <div class="result-label">Budget</div>
      <div class="result-val" id="r-bud" style="color:#10b981">$5,000</div>
    </div>
  </div>
</div>

<script>
  function setupSlider({ inputId, fillId, thumbId, bubbleId, valId, resultId, format }) {
    const input  = document.getElementById(inputId);
    const fill   = document.getElementById(fillId);
    const thumb  = document.getElementById(thumbId);
    const bubble = document.getElementById(bubbleId);
    const valEl  = document.getElementById(valId);
    const resEl  = document.getElementById(resultId);

    function update() {
      const min = +input.min, max = +input.max, val = +input.value;
      const pct = ((val - min) / (max - min)) * 100;

      fill.style.width   = pct + '%';
      thumb.style.left   = pct + '%';
      bubble.style.left  = pct + '%';

      const display = format(val);
      bubble.textContent = display;

      // Update value label (preserve inner unit span if present)
      const unitSpan = valEl.querySelector('.slider-unit');
      if (inputId === 'bud') {
        document.getElementById('bud-num').textContent = val.toLocaleString();
      } else {
        valEl.childNodes[0].textContent = val;
      }

      if (resEl) resEl.textContent = display;
    }

    input.addEventListener('input', update);
    update();
  }

  setupSlider({
    inputId: 'vol',  fillId: 'vol-fill',  thumbId: 'vol-thumb',
    bubbleId: 'vol-bubble', valId: 'vol-val', resultId: 'r-vol',
    format: v => v + '%',
  });
  setupSlider({
    inputId: 'temp', fillId: 'temp-fill', thumbId: 'temp-thumb',
    bubbleId: 'temp-bubble', valId: 'temp-val', resultId: 'r-temp',
    format: v => v + '\u00b0C',
  });
  setupSlider({
    inputId: 'bud',  fillId: 'bud-fill',  thumbId: 'bud-thumb',
    bubbleId: 'bud-bubble', valId: 'bud-val', resultId: 'r-bud',
    format: v => '$' + Number(v).toLocaleString(),
  });
</script>
</body>
</html>
